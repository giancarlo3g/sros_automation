name: sim
prefix: ""

topology:
  defaults:
    kind: nokia_srsim
  kinds:
    nokia_srsim:
      image: nokia_srsim:25.10.R1
      license: ../../../lic/license-srsim25.txt
    linux:
      image: ghcr.io/mfzhsn/network-multitool-sshd:0.0.2
  nodes:
    ixrr6d: #IXR-R6d
      kind: nokia_srsim
      type: ixr-r6d
      components:
        - slot: A
          type: cpiom-ixr-r6d
        - slot: 1
          type: iom-ixr-r6d
          mda:
            - slot: 1
              type: m5-100g-qsfp28
      startup-config: ./startup_config/ixrr6d.partial.txt
    
    ixre2c: #IXR-e2c
      kind: nokia_srsim
      type: ixr-e2c
      startup-config: ./startup_config/ixre2c.partial.txt

  links:
    - endpoints: ["ixrr6d:1/1/c1/1", "ixre2c:1/1/c13/1"]
    - endpoints: ["ixrr6d:1/1/c2/1", "ixre2c:1/1/c14/1"]